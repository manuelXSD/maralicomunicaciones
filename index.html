<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marali Comunicaciones - Inicio de Sesión</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c245c 0%, #5c305c 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            background: #f5f5f5;
            padding: 10px;
        }

        h1 {
            color: #2c245c;
            margin: 20px 0 5px;
            font-size: 28px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin: 0 0 30px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #fcc30b;
            box-shadow: 0 0 0 3px rgba(252, 195, 11, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #fcc30b 0%, #f3992c 100%);
            color: #2c245c;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(252, 195, 11, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .alert.success {
            background: #efe;
            color: #0a0;
            border: 1px solid #cfc;
        }

        .forgot-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-forgot {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 0;
            transition: color 0.2s;
        }

        .btn-forgot:hover {
            color: #333;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .btn-back {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            color: #2c245c;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .loading {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(44, 36, 92, 0.2);
            border-top-color: #2c245c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .demo-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .demo-info strong {
            color: #2c245c;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="logomarali.png" alt="Marali Comunicaciones" onerror="this.src='https://via.placeholder.com/100?text=M'">
            </div>

            <h1>Marali Comunicaciones</h1>
            <p class="subtitle">Sistema de Gestión - v3.0 Web</p>

            <!-- Alertas -->
            <div id="alertContainer"></div>

            <!-- Formulario de Login -->
            <div id="loginForm" class="form-container active">
                <form id="formLogin">
                    <div class="form-group">
                        <label for="usuario">Usuario:</label>
                        <input type="text" id="usuario" required placeholder="Ingresa tu usuario" autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="contraseña">Contraseña:</label>
                        <input type="password" id="contraseña" required placeholder="Ingresa tu contraseña" autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-login" id="btnLogin">
                        <span id="loginText">Iniciar Sesión</span>
                        <span id="loginLoading" style="display: none;" class="loading"></span>
                    </button>
                </form>

                <div class="forgot-container">
                    <button type="button" class="btn-forgot" onclick="showRecoveryForm()">
                        ¿Olvidaste el usuario o contraseña?
                    </button>
                </div>
            </div>

            <!-- Formulario de Recuperación -->
            <div id="recoveryForm" class="form-container">
                <form id="formRecovery">
                    <h3 style="margin-top: 0; color: #2c245c;">Recuperar Credenciales</h3>
                    <p style="color: #999; font-size: 13px;">Te enviaremos un correo de recuperación</p>

                    <div class="form-group">
                        <label for="recovery_email">Correo Electrónico:</label>
                        <input type="email" id="recovery_email" required placeholder="Tu correo">
                    </div>

                    <button type="submit" class="btn-login" id="btnRecovery">
                        <span id="recoveryText">Enviar Enlace</span>
                        <span id="recoveryLoading" style="display: none;" class="loading"></span>
                    </button>
                    <button type="button" class="btn-back" onclick="showLoginForm()">Volver</button>
                </form>
            </div>

            <div class="demo-info">
                <p>Demo: usuario: <strong>admin</strong> | contraseña: <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js?v=2';
        import { loginUser, createDemoUsers, resetPassword } from './js/auth.js?v=3';

        // Mostrar/ocultar formularios
        window.showRecoveryForm = () => {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('recoveryForm').classList.add('active');
        };

        window.showLoginForm = () => {
            document.getElementById('recoveryForm').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
        };

        // Mostrar alertas
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert ${type} show">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // Formulario de Login
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value.trim();
            const contraseña = document.getElementById('contraseña').value;

            if (!usuario || !contraseña) {
                showAlert('error', 'Por favor completa todos los campos');
                return;
            }

            const btnLogin = document.getElementById('btnLogin');
            const loginText = document.getElementById('loginText');
            const loginLoading = document.getElementById('loginLoading');

            btnLogin.disabled = true;
            loginText.style.display = 'none';
            loginLoading.style.display = 'inline-block';

            try {
                console.log('📝 Intentando login...');
                await loginUser(usuario, contraseña);
                console.log('✓ Login exitoso, redirigiendo...');
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('❌ Error de login:', error);
                // Extraer mensaje de error de forma segura
                let mensajeError = 'Error al iniciar sesión';
                if (error && error.message) {
                    mensajeError = error.message;
                } else if (typeof error === 'string') {
                    mensajeError = error;
                }
                showAlert('error', mensajeError);
            } finally {
                btnLogin.disabled = false;
                loginText.style.display = 'inline-block';
                loginLoading.style.display = 'none';
            }
        });

        // Formulario de Recuperación
        document.getElementById('formRecovery').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recovery_email').value.trim();

            if (!email) {
                showAlert('error', 'Por favor ingresa tu correo');
                return;
            }

            const btnRecovery = document.getElementById('btnRecovery');
            const recoveryText = document.getElementById('recoveryText');
            const recoveryLoading = document.getElementById('recoveryLoading');

            btnRecovery.disabled = true;
            recoveryText.style.display = 'none';
            recoveryLoading.style.display = 'inline-block';

            try {
                await resetPassword(email);
                showAlert('success', 'Se envió un enlace de recuperación a tu correo');
                document.getElementById('recovery_email').value = '';
                setTimeout(() => showLoginForm(), 2000);
            } catch (error) {
                console.error('Error de recuperación:', error);
                showAlert('error', error.message || 'Error al enviar correo de recuperación');
            } finally {
                btnRecovery.disabled = false;
                recoveryText.style.display = 'inline-block';
                recoveryLoading.style.display = 'none';
            }
        });

        // Crear usuarios demo si no existen
        createDemoUsers().catch(err => console.log('Demo users check:', err));

        // Redirigir si ya está logueado
        auth.onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('index.html')) {
                window.location.href = 'dashboard.html';
            }
        });

        // Cargar herramientas de debug (opcional)
        import('./js/debug.js?v=1').catch(err => console.log('Debug tools not loaded'));
    </script>
</body>
</html>
